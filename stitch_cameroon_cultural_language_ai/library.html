<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Mboa - Heritage Library</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;500;600;700&amp;family=Work+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>

<script>
    tailwind.config = {
        darkMode: "class",
        theme: {

                    "surface-bright": "#fcf9f8",
                    "tertiary-fixed-dim": "#95d3ba",
                    "on-secondary-fixed-variant": "#5d4200",
                    "on-background": "#1b1c1c",
                    "tertiary-fixed": "#b0f0d6",
                    "surface-container": "#f0eded",
                    "secondary": "#7a5900",
                    "primary-fixed": "#ffdbcd",
                    "on-tertiary-container": "#b4f4da",
                    "on-secondary-fixed": "#261900",
                    "background": "#fcf9f8",
                    "on-primary": "#ffffff",
                    "secondary-fixed-dim": "#fdbc13",
                    "surface-container-highest": "#e4e2e1",
                    "on-primary-container": "#ffe1d6",
                    "inverse-on-surface": "#f3f0ef",
                    "surface-container-lowest": "#ffffff",
                    "surface-variant": "#e4e2e1",
                    "error": "#ba1a1a",
                    "on-error-container": "#93000a",
                    "primary-container": "#a0522d",
                    "tertiary": "#185946",
                    "primary": "#823b18",
                    "secondary-container": "#fdbc13",
                    "surface-dim": "#dcd9d9",
                    "inverse-primary": "#ffb596",
                    "error-container": "#ffdad6",
                    "on-primary-fixed-variant": "#76320f",
                    "secondary-fixed": "#ffdea3",
                    "primary-fixed-dim": "#ffb596",
                    "surface-container-low": "#f6f3f2",
                    "on-primary-fixed": "#360f00",
                    "on-tertiary-fixed": "#002117",
                    "on-tertiary-fixed-variant": "#0b513d",
                    "on-error": "#ffffff",
                    "surface-tint": "#944925",
                    "on-surface": "#1b1c1c",
                    "outline-variant": "#dac1b8",
                    "outline": "#87736b",
                    "surface": "#fcf9f8",
                    "on-tertiary": "#ffffff",
                    "on-surface-variant": "#54433c",
                    "on-secondary": "#ffffff",
                    "surface-container-high": "#eae7e7",
                    "inverse-surface": "#303030",
                    "on-secondary-container": "#6b4d00"
                },
                "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
                },
                "spacing": {
                    "unit": "8px",

                    "container-max": "1280px",

                "fontSize": {

                    "label-md": ["14px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "display-lg": ["48px", {"lineHeight": "1.1", "fontWeight": "600"}],

<style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .ndop-pattern { background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 0l20 20-20 20L0 20z' fill='%23a0522d' fill-opacity='0.05'/%3E%3Ccircle cx='20' cy='20' r='2' fill='%23a0522d' fill-opacity='0.1'/%3E%3C/svg%3E"); }
</style>
</head>
<body class="bg-surface-bright font-body-md text-on-surface min-h-screen flex">

<div class="flex flex-1 h-screen">
<main class="flex-1 flex flex-col min-w-0 h-screen overflow-y-auto">
<div class="p-margin-mobile md:p-margin-desktop space-y-8 ndop-pattern">
<section class="bg-surface-container-lowest rounded-full p-8 border border-outline-variant/30 shadow-sm relative overflow-hidden">
<div class="absolute top-0 right-0 w-64 h-full opacity-10 pointer-events-none">
<svg class="w-full h-full fill-primary" viewbox="0 0 100 100">
<path d="M0,50 L50,0 L100,50 L50,100 Z M50,20 L80,50 L50,80 L20,50 Z"></path>
</svg>
</div>
<div class="relative z-10 max-w-2xl">
<h1 class="font-display-lg text-display-lg text-primary mb-4">Bibliothèque du patrimoine</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant mb-6">Explorez la diverse trame linguistique et culturelle du Cameroun.</p>
<div class="flex gap-4 flex-wrap">
<div class="relative max-w-md flex-1">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">search</span>
<input id="search-input" class="w-full pl-10 pr-4 py-3 bg-white border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none font-body-md" placeholder="Rechercher du contenu..." type="text" oninput="filterContent()"/>
</div>
<select id="filter-language" class="bg-white border border-outline-variant rounded-xl px-4 py-3 font-body-md" onchange="filterContent()">
<option value="">Toutes les langues</option>
<option value="1">Bulu</option><option value="2">Beti</option><option value="3">Bamileke</option><option value="4">Ewondo</option><option value="5">Douala</option>
</select>
<select id="filter-type" class="bg-white border border-outline-variant rounded-xl px-4 py-3 font-body-md" onchange="filterContent()">
<option value="">Tous les types</option>
<option value="article">Article</option><option value="video">Vidéo</option><option value="audio">Audio</option>
</select>
</div>
</div>
</section>

<section id="library-container" class="grid grid-cols-1 md:grid-cols-12 gap-gutter">
<div class="flex items-center justify-center col-span-full h-32">
<div class="flex items-center gap-3 text-on-surface-variant">
<span class="material-symbols-outlined animate-spin">progress_activity</span>
<span>Loading library...</span>
</div>
</div>
</section>
</div>
</main>

<div id="detail-modal" class="hidden fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4">
<div class="bg-white rounded-xl max-w-2xl w-full max-h-[80vh] overflow-y-auto p-8 relative">
<button onclick="closeDetail()" class="absolute top-4 right-4 text-stone-400 hover:text-stone-600"><span class="material-symbols-outlined">close</span></button>
<div id="detail-content"></div>
</div>
</div>

<script src="js/app.js"></script>
<script>
let libraryData = [];

document.addEventListener('DOMContentLoaded', () => {
    if (!requireAuth()) return;
    loadLibrary();
});

async function loadLibrary() {
    try {
        const res = await API.getLibrary();
        libraryData = res.data || [];
        renderLibrary(libraryData);
    } catch (err) {
        document.getElementById('library-container').innerHTML = `<div class="col-span-full text-center py-12"><span class="material-symbols-outlined text-6xl text-stone-300 mb-4">auto_stories</span><p class="font-body-lg text-on-surface-variant">No content yet. Content will appear as it's added.</p></div>`;
    }
}

function filterContent() {
    const search = document.getElementById('search-input').value.toLowerCase();
    const lang = document.getElementById('filter-language').value;
    const type = document.getElementById('filter-type').value;

    let filtered = libraryData;
    if (lang) filtered = filtered.filter(c => c.language_id == lang);
    if (type) filtered = filtered.filter(c => c.content_type === type);
    if (search) filtered = filtered.filter(c =>
        (c.title && c.title.toLowerCase().includes(search)) ||
        (c.content && c.content.toLowerCase().includes(search)) ||
        (c.category && c.category.toLowerCase().includes(search)) ||
        (c.region && c.region.toLowerCase().includes(search))
    );

    renderLibrary(filtered);
}

function renderLibrary(content) {
    const container = document.getElementById('library-container');

    if (!content || content.length === 0) {
        container.innerHTML = `<div class="col-span-full text-center py-12"><span class="material-symbols-outlined text-6xl text-stone-300 mb-4">auto_stories</span><p class="font-body-lg text-on-surface-variant">No matching content found.</p></div>`;
        return;
    }

    const mainItem = content[0];
    const sideItems = content.slice(1, 3);
    const restItems = content.slice(3);

    const borderColors = ['border-primary', 'border-secondary-container', 'border-tertiary'];
    const typeIcons = { article: 'article', video: 'play_circle', audio: 'audio_file', image: 'image' };

    let html = '';

    html += `
    <div class="md:col-span-8 group cursor-pointer">
        <article onclick="openDetail(${mainItem.id})" class="bg-surface-container-lowest border border-outline-variant/20 rounded-xl overflow-hidden shadow-sm hover:shadow-md transition-shadow h-full flex flex-col">
            <div class="aspect-[16/7] overflow-hidden bg-surface-container flex items-center justify-center">
                <span class="material-symbols-outlined text-6xl text-primary opacity-30">${typeIcons[mainItem.content_type] || 'article'}</span>
            </div>
            <div class="p-6 flex flex-col flex-1 border-b-4 ${borderColors[0]}">
                <span class="font-label-md text-label-md text-tertiary-container uppercase mb-2">${escapeHtml(mainItem.category || mainItem.language_name || 'Culture')}</span>
                <h2 class="font-headline-lg text-headline-lg text-primary mb-3">${escapeHtml(mainItem.title)}</h2>
                <p class="font-body-md text-body-md text-on-surface-variant mb-4 grow">${escapeHtml((mainItem.content || '').substring(0, 200))}${mainItem.content && mainItem.content.length > 200 ? '...' : ''}</p>
                <div class="flex items-center gap-2 text-primary font-label-md">
                    <span>Read More</span>
                    <span class="material-symbols-outlined">arrow_forward</span>
                </div>
            </div>
        </article>
    </div>`;

    sideItems.forEach((item, i) => {
        html += `
        <div class="md:col-span-4 group cursor-pointer">
            <article onclick="openDetail(${item.id})" class="bg-surface-container-lowest border border-outline-variant/20 rounded-xl overflow-hidden shadow-sm hover:shadow-md transition-shadow h-full flex flex-col">
                <div class="aspect-square overflow-hidden bg-surface-container flex items-center justify-center">
                    <span class="material-symbols-outlined text-4xl text-primary opacity-30">${typeIcons[item.content_type] || 'article'}</span>
                </div>
                <div class="p-6 flex flex-col flex-1 border-b-4 ${borderColors[i+1] || borderColors[0]}">
                    <span class="font-label-md text-label-md text-secondary uppercase mb-2">${escapeHtml(item.region || item.language_name || '')}</span>
                    <h2 class="font-headline-md text-headline-md text-primary mb-3">${escapeHtml(item.title)}</h2>
                    <p class="font-body-md text-body-md text-on-surface-variant mb-4">${escapeHtml((item.content || '').substring(0, 120))}${item.content && item.content.length > 120 ? '...' : ''}</p>
                    <div class="mt-auto flex items-center gap-2 text-primary font-label-md">
                        <span>Explore</span>
                        <span class="material-symbols-outlined">arrow_forward</span>
                    </div>
                </div>
            </article>
        </div>`;
    });

    if (restItems.length > 0) {
        html += `<div class="md:col-span-12 mt-8"><h3 class="font-headline-md text-headline-md text-on-surface mb-6">More Content</h3><div class="grid grid-cols-1 md:grid-cols-3 gap-6">`;
        restItems.forEach(item => {
            html += `
            <article onclick="openDetail(${item.id})" class="bg-white rounded-xl border border-outline-variant p-6 shadow-sm hover:shadow-md transition-shadow cursor-pointer">
                <div class="flex items-center gap-2 mb-3">
                    <span class="material-symbols-outlined text-sm text-primary">${typeIcons[item.content_type] || 'article'}</span>
                    <span class="font-label-md text-xs uppercase text-tertiary-container">${escapeHtml(item.category || '')}</span>
                </div>
                <h4 class="font-headline-md text-sm text-primary mb-2">${escapeHtml(item.title)}</h4>
                <p class="text-sm text-on-surface-variant mb-3">${escapeHtml((item.content || '').substring(0, 100))}${item.content && item.content.length > 100 ? '...' : ''}</p>
                <p class="text-xs text-stone-400">${item.language_name || ''}${item.region ? ' • ' + item.region : ''}</p>
            </article>`;
        });
        html += `</div></div>`;
    }

    container.innerHTML = html;
}

async function openDetail(id) {
    try {
        const res = await API.getLibraryDetail(id);
        const item = res.data;
        document.getElementById('detail-content').innerHTML = `
            <span class="font-label-md text-label-md text-tertiary-container uppercase">${escapeHtml(item.category || '')}</span>
            <h2 class="font-headline-lg text-headline-lg text-primary mb-4">${escapeHtml(item.title)}</h2>
            <div class="flex items-center gap-4 text-sm text-stone-500 mb-6">
                <span>${item.language_name || ''}</span>
                ${item.region ? `<span>• ${escapeHtml(item.region)}</span>` : ''}
                ${item.author ? `<span>• By ${escapeHtml(item.author)}</span>` : ''}
            </div>
            <div class="font-body-md text-on-surface leading-relaxed whitespace-pre-wrap">${escapeHtml(item.content || 'No content available.')}</div>
        `;
        document.getElementById('detail-modal').classList.remove('hidden');
    } catch (err) {
        alert('Failed to load content: ' + err.message);
    }
}

function closeDetail() {
    document.getElementById('detail-modal').classList.add('hidden');
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

document.getElementById('detail-modal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeDetail();
});
</script>
</body>
</html>
