<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - LingoCameroon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,600;6..72,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root {
            --primary: #A0522D;
            --surface: #fcf9f8;
            --on-surface: #1C1B1B;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--surface);
            color: var(--on-surface);
        }
        h1, h2, h3 {
            font-family: 'Newsreader', serif;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-6">
    <div class="max-w-md w-full">
        <!-- Logo -->
            <div class="text-center mb-10">
                <img src="logoo.png" alt="Mboa Logo" class="w-40 h-auto mx-auto mb-4">
            <h1 class="text-4xl font-bold text-[#1C1B1B] mb-2">Créer un compte</h1>
            <p class="text-stone-600">Rejoignez la communauté LingoCameroon</p>
        </div>

        <!-- Register Form -->
        <div class="bg-white p-8 rounded-xl border border-stone-200 shadow-sm">
            <form onsubmit="handleRegister(event)" class="space-y-5">
                <div>
                    <label for="name" class="block text-sm font-medium text-stone-700 mb-2">Nom complet</label>
                    <input type="text" id="name" name="name" required
                        class="w-full px-4 py-3 border border-stone-300 rounded-lg focus:ring-2 focus:ring-[#A0522D] focus:border-[#A0522D] outline-none transition-colors"
                        placeholder="Votre nom complet">
                </div>
                <div>
                    <label for="email" class="block text-sm font-medium text-stone-700 mb-2">Adresse email</label>
                    <input type="email" id="email" name="email" required
                        class="w-full px-4 py-3 border border-stone-300 rounded-lg focus:ring-2 focus:ring-[#A0522D] focus:border-[#A0522D] outline-none transition-colors"
                        placeholder="votre@email.com">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-stone-700 mb-2">Mot de passe</label>
                    <input type="password" id="password" name="password" required
                        class="w-full px-4 py-3 border border-stone-300 rounded-lg focus:ring-2 focus:ring-[#A0522D] focus:border-[#A0522D] outline-none transition-colors"
                        placeholder="••••••••">
                </div>
                <div>
                    <label for="confirm-password" class="block text-sm font-medium text-stone-700 mb-2">Confirmer le mot de passe</label>
                    <input type="password" id="confirm-password" name="confirm-password" required
                        class="w-full px-4 py-3 border border-stone-300 rounded-lg focus:ring-2 focus:ring-[#A0522D] focus:border-[#A0522D] outline-none transition-colors"
                        placeholder="••••••••">
                </div>

                <div class="flex items-start gap-2">
                    <input type="checkbox" id="terms" class="mt-1 rounded border-stone-300 text-[#A0522D] focus:ring-[#A0522D]">
                    <label for="terms" class="text-sm text-stone-600">
                        J'accepte les <a href="#" class="text-[#A0522D] hover:underline">conditions d'utilisation</a> et la <a href="#" class="text-[#A0522D] hover:underline">politique de confidentialité</a>
                    </label>
                </div>

                <button type="submit"
                    class="w-full bg-[#A0522D] text-white py-3 rounded-lg font-semibold hover:bg-[#8B4513] transition-colors">
                    S'inscrire
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-sm text-stone-600">
                    Déjà un compte ?
                    <a href="login.html" class="text-[#A0522D] font-semibold hover:underline">Se connecter</a>
                </p>
            </div>
        </div>

        <!-- Back to Home -->
        <div class="text-center mt-8">
            <a href="index.html" class="text-sm text-stone-600 hover:text-[#A0522D] inline-flex items-center gap-2">
                <span class="material-symbols-outlined text-lg">arrow_back</span>
                Retour à l'accueil
            </a>
        </div>
    </div>

    <script>
    const API_BASE = 'http://localhost:8000/backend/api';

    async function handleRegister(e) {
        e.preventDefault();
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirm-password').value;
        const btn = e.target.querySelector('button[type="submit"]');

        if (password !== confirm) {
            alert('Les mots de passe ne correspondent pas');
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Inscription...';
        try {
            const names = name.split(' ');
            const firstName = names[0] || 'User';
            const lastName = names.slice(1).join(' ') || '';
            const res = await fetch(`${API_BASE}/auth.php?action=register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password, first_name: firstName, last_name: lastName })
            });
            const data = await res.json();
            if (data.success && data.data.token) {
                localStorage.setItem('lingo_token', data.data.token);
                localStorage.setItem('lingo_user', JSON.stringify(data.data.user));
                window.location.href = 'stitch_cameroon_cultural_language_ai/app.html';
            } else {
                alert(data.message || 'Erreur d\'inscription');
            }
        } catch (err) {
            alert('Erreur d\'inscription');
        } finally {
            btn.disabled = false;
            btn.textContent = 'S\'inscrire';
        }
    }

    if (localStorage.getItem('lingo_token')) {
        window.location.href = 'stitch_cameroon_cultural_language_ai/app.html';
    }
    </script>
</body>
</html>
